<!DOCTYPE html>
<html>
<head>
  <title>Debug Pipeline</title>
  <style>
    body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
    input { width: 80%; padding: 8px; font-size: 14px; }
    button { padding: 8px 16px; margin-left: 10px; }
    #log { margin-top: 20px; max-height: 80vh; overflow-y: auto; border: 1px solid #0f0; padding: 10px; }
    .event { margin: 5px 0; padding: 5px; border-left: 3px solid #0f0; }
    .error { color: #f00; border-left-color: #f00; }
  </style>
</head>
<body>

<h1>Pipeline Debug</h1>
<input type="text" id="brief" value="Find sustainable fashion PR agencies in London working with emerging brands" />
<button onclick="run()">Run</button>

<div id="log"></div>

<script>
const log = document.getElementById('log');

function run() {
  const brief = document.getElementById('brief').value;
  log.innerHTML = '';

  const es = new EventSource(`/run?brief=${encodeURIComponent(brief)}`);

  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      const div = document.createElement('div');
      div.className = 'event';
      if (msg.data && msg.data.message && msg.data.message.includes('Error')) {
        div.className += ' error';
      }
      div.textContent = JSON.stringify(msg, null, 2);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    } catch (err) {
      console.error(err);
    }
  };

  es.onerror = () => {
    es.close();
    const div = document.createElement('div');
    div.className = 'event error';
    div.textContent = 'Stream closed';
    log.appendChild(div);
  };
}
</script>

</body>
</html>
